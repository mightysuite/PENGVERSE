<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" type="image/jpeg" href="Home screen Photo.jpeg">
    <title>PENGVERSE | Official Links & Shop</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        hero: ['"Bebas Neue"', 'sans-serif'],
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF5500', 
                            black: '#030303',
                            surface: '#0F0F0F',
                            border: '#222222',
                            text: '#FFFFFF'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            color: #111111;
            -webkit-font-smoothing: antialiased;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #ffffff;
        }

        /* Animated Pale White Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: linear-gradient(-45deg, #ffffff, #f1f5f9, #e2e8f0, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Frosted White Glass Elements */
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .link-card {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .link-card:hover, .link-card:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .view-section {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .view-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96) translateY(20px);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }
        
        .view-active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            position: relative;
            visibility: visible;
            height: auto;
            overflow: visible;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* ── Shop Elements ── */
        .shop-nav {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 0.5rem;
        }
        
        .filter-scroll::-webkit-scrollbar { height: 4px; }
        .filter-scroll::-webkit-scrollbar-track { background: transparent; }
        .filter-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background: #030303;
            color: #ffffff;
            border-color: #030303;
        }

        .product-card {
            transition: box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .product-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transform: translateY(-6px);
            background: rgba(255,255,255,0.85);
        }

        .card-img-wrap {
            position: relative;
            width:100%;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .product-card:hover .card-img-wrap img {
            transform: scale(1.08);
        }

        .cart-badge {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-badge.pop {
            transform: scale(1.4);
        }

        #toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: none;
        }
        
        .custom-toast {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .custom-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="relative w-full min-h-screen selection:bg-black selection:text-white">
    
    <div class="bg-animated"></div>
    <div id="toast-container"></div>

    <!-- WRAPPER -->
    <div class="relative w-full z-10 min-h-[100dvh] flex flex-col items-center">
        
        <!-- ============================================== -->
        <!-- VIEW 1: LINKS DIRECTORY -->
        <!-- ============================================== -->
        <main id="view-links" class="view-section view-active w-full min-h-[100dvh] flex items-center justify-center relative px-4 py-16">
            
            <!-- Content Container -->
            <div class="w-full max-w-[420px] flex flex-col items-center z-10 relative">
                
                <header class="flex flex-col items-center mb-10 w-full animate-fade-in-up">
                    <!-- Profile Picture -->
                    <div class="mb-2 group cursor-pointer relative flex justify-center w-full -mb-8 z-10">
                        <img 
                            src="Spy transparent logo.png" 
                            alt="Pengverse Profile" 
                            class="w-48 sm:w-56 h-auto object-contain transition-transform duration-500 group-hover:scale-105"
                        >
                    </div>

                    <h1 class="text-6xl sm:text-7xl font-hero tracking-widest text-center mb-1 text-black drop-shadow-sm">
                        PENGVERSE<span class="text-brand-orange">.</span>
                    </h1>
                    <p class="text-black/60 font-semibold tracking-[0.2em] uppercase text-xs text-center">
                        Official Store & Links
                    </p>

                    <!-- Social Icons Row -->
                    <div class="flex gap-5 mt-6">
                        <a href="https://www.instagram.com/peng_verse?igsh=ajd5OXh4eDJ2MzF2" target="_blank" onclick="showToast('Redirecting to Instagram...', true, 'fab fa-instagram'); return true;" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:scale-110 transition-all shadow-sm">
                            <i class="fab fa-instagram text-xl bg-gradient-to-tr from-[#f09433] via-[#dc2743] to-[#bc1888] text-transparent bg-clip-text"></i>
                        </a>
                        <a href="https://www.facebook.com/share/14bVj8z5v6r/" target="_blank" onclick="showToast('Redirecting to Facebook...', true, 'fab fa-facebook'); return true;" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:scale-110 transition-all shadow-sm">
                            <i class="fab fa-facebook text-xl text-[#1877F2]"></i>
                        </a>
                        <a href="https://youtube.com/@pengverse?si=2bwOXQag-bWbCemV" target="_blank" onclick="showToast('Redirecting to YouTube...', true, 'fab fa-youtube'); return true;" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white hover:scale-110 transition-all shadow-sm">
                            <i class="fab fa-youtube text-xl text-[#FF0000]"></i>
                        </a>
                    </div>
                </header>

                <div class="w-full flex flex-col gap-4 items-center animate-fade-in-up mb-16" style="animation-delay: 0.15s;">
                    <div class="w-full flex flex-col gap-4 items-center max-w-[340px]">
                        
                        <!-- Main Store Button -->
                        <button onclick="openShop('Store')" class="link-card rounded-xl p-4 w-full flex items-center justify-between group outline-none">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center group-hover:bg-white transition-colors">
                                    <i class="fas fa-store link-icon text-sm text-black"></i>
                                </div>
                                <span class="font-bold text-sm tracking-widest uppercase text-black">Store</span>
                            </div>
                            <i class="fas fa-arrow-right link-icon text-black opacity-40 group-hover:translate-x-1 group-hover:opacity-100 transition-all"></i>
                        </button>

                        <!-- Wallpapers Button -->
                        <button onclick="openShop('Peng Wallpapers')" class="link-card rounded-xl p-4 w-full flex items-center justify-between group outline-none">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center group-hover:bg-white transition-colors">
                                    <i class="fas fa-image link-icon text-sm text-black"></i>
                                </div>
                                <span class="font-bold text-sm tracking-widest uppercase text-black">Wallpapers</span>
                            </div>
                            <i class="fas fa-arrow-right link-icon text-black opacity-40 group-hover:translate-x-1 group-hover:opacity-100 transition-all"></i>
                        </button>

                        <!-- Support Button -->
                        <a href="https://donate.stripe.com/aFa8wO3VU2b7c57gZg1ck08" target="_blank" onclick="showToast('Thank you for supporting Peng!', true, 'fas fa-heart text-brand-orange'); return true;" class="link-card rounded-2xl p-5 w-full flex items-center justify-between group outline-none bg-brand-orange/10 border-brand-orange/20 hover:bg-brand-orange/20 hover:border-brand-orange/40 mt-2">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-brand-orange/20 flex items-center justify-center group-hover:bg-brand-orange/30 transition-colors">
                                    <i class="fas fa-fish text-brand-orange text-base drop-shadow-sm"></i>
                                </div>
                                <span class="font-bold text-[0.95rem] tracking-widest uppercase text-black">Feed Peng</span>
                            </div>
                            <i class="fas fa-heart text-brand-orange opacity-70 group-hover:scale-125 group-hover:opacity-100 transition-all duration-300"></i>
                        </a>

                    </div>
                </div>
                
            </div>
        </main>

        <!-- ============================================== -->
        <!-- VIEW 2: DYNAMIC SHOP PAGE -->
        <!-- ============================================== -->
        <main id="view-shop" class="view-section view-hidden w-full min-h-[100dvh] absolute top-0 left-0 z-20">
            <div class="w-full max-w-[1400px] mx-auto flex flex-col p-4 sm:p-8 pb-32">
                
                <!-- Shop Header -->
                <nav class="shop-nav glass-panel py-4 mb-6 sticky top-4 rounded-3xl z-40 px-5 shadow-sm border border-white/80 bg-white/70">
                    <button onclick="closeShop()" class="justify-self-start flex items-center gap-2 text-black/80 hover:text-black transition-all group bg-white/50 border border-black/10 px-4 py-2.5 rounded-full hover:bg-white">
                        <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform text-sm"></i>
                        <span class="font-bold tracking-widest uppercase text-xs hidden sm:inline">Back</span>
                    </button>
                    
                    <h2 id="shop-title" class="shop-nav-title font-hero tracking-widest text-black drop-shadow-sm uppercase text-center">
                        STORE
                    </h2>
                    
                    <!-- Floating Cart Button -->
                    <div class="justify-self-end relative cursor-pointer w-11 h-11 flex items-center justify-center bg-white border border-black/10 rounded-full shadow-sm hover:scale-105 transition-transform" onclick="showToast('Cart feature coming soon!', false, 'fas fa-shopping-cart')">
                        <i class="fas fa-shopping-bag text-black"></i>
                        <span id="cart-badge" class="cart-badge absolute -top-1 -right-1 bg-brand-orange text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center opacity-0">0</span>
                    </div>
                </nav>

                <!-- Category Filters (Injected dynamically) -->
                <div id="shop-filters" class="w-full flex gap-3 overflow-x-auto filter-scroll pb-4 mb-4 px-2 -mx-2 sm:mx-0 sm:px-0">
                    <!-- Pills go here -->
                </div>

                <!-- Desktop Grid Layout -->
                <div id="shop-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 gap-y-12 justify-items-center w-full">
                <!-- Injected via JS -->
                </div>  
            </div>
        </main>

    </div>

    <script>
        const productsDB = [
            { id: 1, category: "Apparel", type: "Tee", name: "Peng Beige Tee", img: "Beige Tshirt.png", fit: "cover", comingSoon: true },
            { id: 2, category: "Apparel", type: "Tee", name: "Peng Black Tee", img: "Black Tshirt.png", fit: "cover", comingSoon: true },
            { id: 3, category: "Apparel", type: "Hoodie", name: "Pengverse Hoodie", comingSoon: true, img: "Pengverse hoodie.png", bg: "#F8F8F8" },
            { category: "Peng Plushies", name: "Classic 8\" Plushy", comingSoon: true, img: "Plushie Toy.jpeg", bg: "#FEFEFE", ratio: "4/4"  },
            { id: 8, category: "Peng Wallpapers", type: "Digital", name: "Peng Black", img: "Peng black.png", fit: "contain", bg: "transparent", comingSoon: false },
            { id: 9, category: "Peng Wallpapers", type: "Digital", name: "Don't Touch My Phone", img: "Peng_Don't_touch_my_phone.webp", fit: "cover", comingSoon: false },
            { id: 10, category: "Peng Wallpapers", type: "Digital", name: "Locked", img: "Peng locked.webp", fit: "cover", comingSoon: false },
            { id: 11, category: "Peng Wallpapers", type: "Digital", name: "Superheroes", img: "Peng superheros.png", fit: "cover", comingSoon: false },
            { id: 12, category: "Peng Wallpapers", type: "Digital", name: "Inevitable Thanos", img: "Peng Thanos.webp", fit: "cover", comingSoon: false },
            { id: 13, category: "Peng Wallpapers", type: "Digital", name: "Chill Vibes", img: "Peng_chill_walpaper.png", fit: "cover", comingSoon: false },
            { id: 14, category: "Peng Wallpapers", type: "Digital", name: "Demon Night", img: "Peng_Demon_walpaper.png", fit: "cover", comingSoon: false },
            { id: 15, category: "Peng Wallpapers", type: "Digital", name: "World Cup 2026", img: "Peng_football_walpaper.png", fit: "cover", comingSoon: false },
            { id: 16, category: "Peng Wallpapers", type: "Digital", name: "Not in the Mood", img: "Peng_stop_walpaper.png", fit: "cover", comingSoon: false },
            { id: 17, category: "Peng Wallpapers", type: "Digital", name: "You Suck Anyway", img: "Picsart_26-06-19_00-41-35-626.jpg.jpeg", fit: "cover", comingSoon: false }
        ];

        let currentCategory = 'Store';
        let currentFilter = 'All';
        let cartCount = 0;

        function showToast(message, isSuccess = true, customIcon = null) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            
            let iconHtml = customIcon ? `<i class="${customIcon}"></i>` : (isSuccess ? '<i class="fas fa-check-circle text-green-400"></i>' : '<i class="fas fa-info-circle text-white/70"></i>');
            toast.innerHTML = `${iconHtml} <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function updateCart() {
            cartCount++;
            const badge = document.getElementById('cart-badge');
            badge.innerText = cartCount;
            if (cartCount === 1) badge.classList.remove('opacity-0');
            badge.classList.add('pop');
            setTimeout(() => badge.classList.remove('pop'), 300);
        }

        function handleProductClick(productName, isDownload, isComingSoon = false, imgUrl = '') {
            if (isComingSoon) {
                showToast(`${productName} drops soon!`, false, 'fas fa-clock text-white');
            } else if (isDownload) {
                showToast(`Downloading: ${productName}`, true, 'fas fa-download text-brand-orange');
                if (imgUrl) {
                    const link = document.createElement('a');
                    link.href = imgUrl;
                    const ext = imgUrl.split('.').pop() || 'png';
                    link.download = `${productName.toLowerCase().replace(/[^a-z0-9]+/g, '_')}.${ext}`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } else {
                updateCart();
                showToast(`Added ${productName} to cart!`, true);
            }
        }

        function renderFilters(categories) {
            const filterContainer = document.getElementById('shop-filters');
            if (categories.length <= 1) {
                filterContainer.innerHTML = '';
                filterContainer.classList.add('hidden');
                return;
            }
            filterContainer.classList.remove('hidden');
            const tabs = ['All', ...categories];
            filterContainer.innerHTML = tabs.map(tab => `
                <button onclick="setFilter('${tab}')" 
                        class="filter-btn shrink-0 px-5 py-2 rounded-full border border-black/10 text-sm font-semibold tracking-wide ${tab === currentFilter ? 'active' : 'bg-white/60 text-black/60 hover:bg-white'} backdrop-blur-md">
                    ${tab}
                </button>
            `).join('');
        }

        function setFilter(filterTarget) {
            currentFilter = filterTarget;
            renderProducts();
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText.trim() === filterTarget) {
                    btn.classList.add('active', 'bg-[#030303]', 'text-white');
                    btn.classList.remove('bg-white/60', 'text-black/60');
                } else {
                    btn.classList.remove('active', 'bg-[#030303]', 'text-white');
                    btn.classList.add('bg-white/60', 'text-black/60');
                }
            });
        }

        function renderProducts() {
            const grid = document.getElementById('shop-grid');
            let displayProducts = productsDB.filter(p => currentCategory === 'Store' ? p.category !== 'Peng Wallpapers' : p.category === currentCategory);
            if (currentCategory === 'Store' && currentFilter !== 'All') displayProducts = displayProducts.filter(p => p.category === currentFilter);
            grid.innerHTML = displayProducts.map((p, index) => {
                const isDownload = p.category === 'Peng Wallpapers';
                const isComingSoon = p.comingSoon ? 'true' : 'false';
                return `
                <div class="product-card glass-panel rounded-2xl overflow-hidden flex flex-col animate-fade-in-up" style="animation-delay: ${index * 0.05}s;">
                    <div class="card-img-wrap shrink-0" style="aspect-ratio: ${isDownload ? '9/16' : (p.ratio || '4/2.8')}; background: ${p.bg || (isDownload ? 'transparent' : '#FFFFFF')}; border-radius: 0; margin-bottom: 0;">
                        <img src="${p.img}" alt="${p.name}" loading="lazy" class="w-full h-full object-contain ${p.bg === 'transparent' ? 'mix-blend-multiply' : ''}" style="${p.fit ? `object-fit: ${p.fit};` : ''}">
                    </div>
                    <div class="flex flex-col grow">
                        <div class="flex items-center justify-between px-3 pt-3 pb-2">
                            <h3 class="font-semibold text-sm leading-tight text-black">${p.name}</h3>
                            ${p.comingSoon ? `<span class="font-semibold text-xs text-black/40 ml-2 shrink-0">Soon</span>` : (p.price ? `<span class="font-bold text-sm text-black ml-2 shrink-0">$${p.price.toFixed(2)}</span>` : `<span class="font-bold text-xs text-brand-orange bg-brand-orange/10 px-2 py-0.5 rounded-md ml-2 shrink-0">Free</span>`)}
                        </div>
                        <div class="px-3 pb-3 mt-auto flex items-center justify-center gap-2">
                            ${p.comingSoon ? `<button disabled class="w-full py-2 bg-black/5 text-black/40 font-semibold text-sm rounded-xl cursor-not-allowed">Coming Soon</button>` : (isDownload ? `<button onclick="handleProductClick('${p.name}', ${isDownload}, ${isComingSoon}, '${p.img}')" class="w-full py-2 bg-brand-orange/10 hover:bg-brand-orange text-brand-orange hover:text-white transition-colors font-bold text-sm rounded-xl flex items-center justify-center gap-2"><i class="fas fa-download"></i> Download</button>` : `<button onclick="handleProductClick('${p.name}', ${isDownload}, ${isComingSoon}, '${p.img}')" class="w-full py-2 bg-black hover:bg-black/80 text-white transition-colors font-bold text-sm rounded-xl flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Add to Cart</button>`)}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openShop(targetCategory) {
            const viewLinks = document.getElementById('view-links');
            const viewShop = document.getElementById('view-shop');
            const shopTitle = document.getElementById('shop-title');
            currentCategory = targetCategory;
            currentFilter = 'All';
            viewLinks.classList.remove('view-active');
            viewLinks.classList.add('view-hidden');
            setTimeout(() => {
                shopTitle.innerHTML = targetCategory.toUpperCase() + '<span class="text-brand-orange">.</span>';
                renderFilters(targetCategory === 'Store' ? [...new Set(productsDB.filter(p => p.category !== 'Peng Wallpapers').map(p => p.category))] : []);
                renderProducts();
                window.scrollTo({ top: 0, behavior: 'instant' });
                viewShop.classList.remove('view-hidden');
                viewShop.classList.add('view-active');
            }, 400);
        }

        function closeShop() {
            const viewLinks = document.getElementById('view-links');
            const viewShop = document.getElementById('view-shop');
            viewShop.classList.remove('view-active');
            viewShop.classList.add('view-hidden');
            setTimeout(() => {
                window.scrollTo({ top: 0, behavior: 'instant' });
                viewLinks.classList.remove('view-hidden');
                viewLinks.classList.add('view-active');
            }, 400);
        }
    </script>
</body>
</html>
