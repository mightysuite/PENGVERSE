<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" type="image/jpeg" href="/images/Home screen Photo.jpeg">
    <title>PENGVERSE | Official Links & Shop</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        hero: ['"Bebas Neue"', 'sans-serif'],
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF5500', 
                            black: '#030303',
                            surface: '#0F0F0F',
                            border: '#222222',
                            text: '#FFFFFF'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            color: #111111;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Animated Pale White Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: linear-gradient(-45deg, #ffffff, #f1f5f9, #e2e8f0, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Frosted White Glass Elements */
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .link-card {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Hover / Select state for White Glass */
        .link-card:hover, .link-card:focus {
            background: rgba(255, 255, 255, 0.85);
            border-color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.1);
        }

        /* View Transitions */
        .view-section {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .view-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96) translateY(20px);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .view-active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            position: relative;
        }

        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* ── Shop Elements ── */
        .shop-nav {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Custom scrollbar for filter pills */
        .filter-scroll::-webkit-scrollbar { height: 4px; }
        .filter-scroll::-webkit-scrollbar-track { background: transparent; }
        .filter-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background: #030303;
            color: #ffffff;
            border-color: #030303;
        }

        /* ── Product Card ── */
        .product-card {
            transition: box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            width: 100%;
        }
        .product-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transform: translateY(-6px);
            background: rgba(255,255,255,0.85);
        }

        .card-img-wrap {
            position: relative;
            width:100%;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .product-card:hover .card-img-wrap img {
            transform: scale(1.08);
        }

        /* Badge for Cart */
        .cart-badge {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-badge.pop {
            transform: scale(1.4);
        }

        /* Toast Container */
        #toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: none;
        }
        
        .custom-toast {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .custom-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

                <!-- Category Filters (Injected dynamically) -->

                <!-- Product Grid -->

    <script>
        // Database with stylized placeholder images for immediate visual impact
        const productsDB = [
            // APPAREL
            { id: 1, category: "Apparel", type: "Tee", name: "Peng Beige Tee", price: 40.00, img: "images/Beige Tshirt.png", fit: "cover", comingSoon: false },
            { id: 2, category: "Apparel", type: "Tee", name: "Peng Black Tee", price: 40.00, img: "images/Black Tshirt.png", fit: "cover", comingSoon: false },
            { id: 3, category: "Apparel", type: "Hoodie", name: "Classic Hoodie", comingSoon: true, img: "https://placehold.co/600x600/E5E5E5/111111?text=HOODIE\nSoon", bg: "#F8F8F8" },
            { category: "Apparel", name: "Heavyweight Box Tee", price: 40.00, img: "images/Tshirt design 1.png", bg: "#F8F8F8"  },
            { category: "Apparel", name: "Gritty Graphic Tee", price: 45.00,comingSoon:true, img: "https://placehold.co/600x600/E5E5E5/111111?text=HOODIE\nSoon", bg: "#F5F5F4" },
            { category: "Apparel", name: "Spy Graphic Tee", price: 50.00, img: "images/Spy Tshirt 1.png", bg: "#FEFEFE" },
            { category: "Apparel", name: "Spy Graphic Tee", price: 50.00, img: "images/Spy Tshirt 2.png", bg: "#F9F8F9" },
            // { category: "Apparel", name: "Sasha Graphic Tee ", price: 50.00, img: "images/Sasha Tshirt.png", bg: "#FDFDFE" },

            // HOODIES
            { category: "Peng Hoodies", name: "OG Logo Hoodie", price: 85.00, img: "images/Hoodie.png", bg: "#F3F3F3" },
            { category: "Peng Hoodies", name: "Spy Hoodie", price: 85.00, img: "images/Spy Hoodie.png", bg: "#F1F1F1" },
            // { category: "Peng Hoodies", name: "Sasha Hoodie", price: 85.00, img: "images/Sasha Hoodie.png", bg: "#fefefe" },
    

            // PLUSHIES
            { category: "Peng Plushies", name: "Classic 8\" Plushy", price: 35.00, img: "images/Plushie Toy.jpeg", bg: "#FEFEFE", ratio: "4/4"  },
            // { category: "Peng Plushies", name: "Mini Desk Buddy", price: 20.00, img: "images/Sasha Plushie.png", fit: "cover" },
        


            // DIGITAL - WALLPAPERS
            { id: 8, category: "Peng Wallpapers", type: "Digital", name: "Peng Black", img: "images/Peng black.png", fit: "cover" },
            { id: 9, category: "Peng Wallpapers", type: "Digital", name: "Don't Touch My Phone", img: "images/Peng_Don't_touch_my_phone.webp", fit: "cover" },
            { id: 10, category: "Peng Wallpapers", type: "Digital", name: "Locked", img: "images/Peng locked.webp", fit: "cover" },
            { id: 11, category: "Peng Wallpapers", type: "Digital", name: "Superheroes", img: "images/Peng superheros.png", fit: "cover" },
            { id: 12, category: "Peng Wallpapers", type: "Digital", name: "Inevitable Thanos", img: "images/Peng Thanos.webp", fit: "cover" },
            { id: 13, category: "Peng Wallpapers", type: "Digital", name: "Chill Vibes", img: "images/Peng_chill_walpaper.png", fit: "cover" },
            { id: 14, category: "Peng Wallpapers", type: "Digital", name: "Demon Night", img: "images/Peng_Demon_walpaper.png", fit: "cover" },
            { id: 15, category: "Peng Wallpapers", type: "Digital", name: "World Cup 2026", img: "images/Peng_football_walpaper.png", fit: "cover" },
            { id: 16, category: "Peng Wallpapers", type: "Digital", name: "Not in the Mood", img: "images/Peng_stop_walpaper.png", fit: "cover" },
            { id: 17, category: "Peng Wallpapers", type: "Digital", name: "You Suck Anyway", img: "images/Picsart_26-06-19_00-41-35-626.jpg.jpeg", fit: "cover" }
        ];

        let currentCategory = 'Store';
        let currentFilter = 'All';
        let cartCount = 0;

        // Custom Toast Notification System
        function showToast(message, isSuccess = true, customIcon = null) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            
            let iconHtml = '';
            if (customIcon) {
                iconHtml = `<i class="${customIcon}"></i>`;
            } else {
                iconHtml = isSuccess ? '<i class="fas fa-check-circle text-green-400"></i>' : '<i class="fas fa-info-circle text-white/70"></i>';
            }

            toast.innerHTML = `${iconHtml} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after delay
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Handle Add to Cart logic
        function updateCart() {
            cartCount++;
            const badge = document.getElementById('cart-badge');
            badge.innerText = cartCount;
            
            if (cartCount === 1) {
                badge.classList.remove('opacity-0');
            }
            
            // Pop animation
            badge.classList.add('pop');
            setTimeout(() => badge.classList.remove('pop'), 300);
        }


        // Product Click Handler
        function handleProductClick(productName, isDownload, isComingSoon = false, imgUrl = '') {
            if (isComingSoon) {
                showToast(`${productName} drops soon!`, false, 'fas fa-clock text-white');
            } else if (isDownload) {
                showToast(`Downloading: ${productName}`, true, 'fas fa-download text-brand-orange');
                if (imgUrl) {
                    const link = document.createElement('a');
                    link.href = imgUrl;
                    const ext = imgUrl.split('.').pop() || 'png';
                    link.download = `${productName.toLowerCase().replace(/[^a-z0-9]+/g, '_')}.${ext}`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } else {
                updateCart();
                showToast(`Added ${productName} to cart!`, true);
            }
        }

        function renderFilters(categories) {
            const filterContainer = document.getElementById('shop-filters');
            if (categories.length <= 1) {
                filterContainer.innerHTML = '';
                filterContainer.classList.add('hidden');
                return;
            }

            filterContainer.classList.remove('hidden');
            const tabs = ['All', ...categories];
            
            filterContainer.innerHTML = tabs.map(tab => `
                <button onclick="setFilter('${tab}')" 
                        class="filter-btn shrink-0 px-5 py-2 rounded-full border border-black/10 text-sm font-semibold tracking-wide ${tab === currentFilter ? 'active' : 'bg-white/60 text-black/60 hover:bg-white'} backdrop-blur-md">
                    ${tab}
                </button>
            `).join('');
        }

        function setFilter(filterTarget) {
            currentFilter = filterTarget;
            renderProducts();
            
            // Update active state on buttons visually without re-rendering them
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText.trim() === filterTarget) {
                    btn.classList.add('active', 'bg-[#030303]', 'text-white');
                    btn.classList.remove('bg-white/60', 'text-black/60');
                } else {
                    btn.classList.remove('active', 'bg-[#030303]', 'text-white');
                    btn.classList.add('bg-white/60', 'text-black/60');
                }
            });
        }

        function renderProducts() {
            const grid = document.getElementById('shop-grid');
            let displayProducts = productsDB;

            // Step 1: Filter by Main View (Store vs Wallpapers)
            if (currentCategory === 'Store') {
                displayProducts = displayProducts.filter(p => p.category !== 'Peng Wallpapers');
            } else {
                displayProducts = displayProducts.filter(p => p.category === currentCategory);
            }

            // Step 2: Filter by Sub-category pills if in Store view
            if (currentCategory === 'Store' && currentFilter !== 'All') {
                displayProducts = displayProducts.filter(p => p.category === currentFilter);
            }

            // Render
            grid.innerHTML = displayProducts.map((p, index) => {
                const isDownload = p.category === 'Peng Wallpapers';
                const isComingSoon = p.comingSoon ? 'true' : 'false';
                // Staggered animation delay based on index
                const delay = index * 0.05;
                
                return `
                <div class="product-card glass-panel rounded-2xl overflow-hidden flex flex-col animate-fade-in-up" 
                     style="animation-delay: ${delay}s;">
                    
                    <div class="card-img-wrap shrink-0" style="aspect-ratio: ${isDownload ? '9/16' : (p.ratio || '4/2.8')}; background: ${p.bg || (isDownload ? 'transparent' : '#FFFFFF')}; border-radius: 0; margin-bottom: 0;">
                        <img src="${p.img}" alt="${p.name}" loading="lazy" class="w-full h-full object-contain" style="${p.fit ? `object-fit: ${p.fit};` : ''}">
                        ${p.comingSoon ? 
                            `<div class="absolute inset-0 bg-black/10 backdrop-blur-[2px] flex items-center justify-center">
                                <span class="bg-white/90 text-black font-bold text-xs uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm border border-black/10">Coming Soon</span>
                            </div>` 
                        : ''}
                    </div>
                    
                    <div class="flex flex-col grow">
                        <div class="flex items-center justify-between px-3 pt-3 pb-2">
                            <h3 class="font-semibold text-sm leading-tight text-black">${p.name}</h3>
                            ${p.comingSoon ? 
                                `<span class="font-semibold text-xs text-black/40 ml-2 shrink-0">Soon</span>` : 
                                (p.price ? 
                                `<span class="font-bold text-sm text-black ml-2 shrink-0">$${p.price.toFixed(2)}</span>` : 
                                `<span class="font-bold text-xs text-brand-orange bg-brand-orange/10 px-2 py-0.5 rounded-md ml-2 shrink-0">Free</span>`)
                            }
                        </div>
                        
                        <div class="px-3 pb-3 mt-auto flex items-center justify-center gap-2">
                            ${p.comingSoon ? 
                                `<button disabled class="w-full py-2 bg-black/5 text-black/40 font-semibold text-sm rounded-xl cursor-not-allowed">Coming Soon</button>` :
                                (isDownload ?
                                `<button onclick="handleProductClick('${p.name}', ${isDownload}, ${isComingSoon}, '${p.img}')" class="w-full py-2 bg-brand-orange/10 hover:bg-brand-orange text-brand-orange hover:text-white transition-colors font-bold text-sm rounded-xl flex items-center justify-center gap-2">
                                    <i class="fas fa-download"></i> Download
                                </button>` :
                                `<button onclick="handleProductClick('${p.name}', ${isDownload}, ${isComingSoon}, '${p.img}')" class="w-full py-2 bg-black hover:bg-black/80 text-white transition-colors font-bold text-sm rounded-xl flex items-center justify-center gap-2">
                                    <i class="fas fa-plus"></i> Add to Cart
                                </button>`)
                            }
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openShop(targetCategory) {
            const viewLinks = document.getElementById('view-links');
            const viewShop = document.getElementById('view-shop');
            const shopTitle = document.getElementById('shop-title');

            currentCategory = targetCategory;
            currentFilter = 'All'; // Reset filter on open

            // Fade out links
            viewLinks.classList.remove('view-active');
            viewLinks.classList.add('view-hidden');

            setTimeout(() => {
                // Formatting title: make the dot orange
                shopTitle.innerHTML = targetCategory.toUpperCase() + '<span class="text-brand-orange">.</span>';
                
                // Determine available sub-categories for filtering
                let subCategories = [];
                if (targetCategory === 'Store') {
                    const storeItems = productsDB.filter(p => p.category !== 'Peng Wallpapers');
                    subCategories = [...new Set(storeItems.map(p => p.category))];
                }

                renderFilters(subCategories);
                renderProducts();

                // Scroll to top of shop container, not window
                viewShop.scrollTop = 0;
                viewShop.classList.remove('view-hidden');
                viewShop.classList.add('view-active');
            }, 400); // Wait for fade out
        }

        function closeShop() {
            const viewLinks = document.getElementById('view-links');
            const viewShop = document.getElementById('view-shop');

            viewShop.classList.remove('view-active');
            viewShop.classList.add('view-hidden');

            setTimeout(() => {
                viewShop.scrollTop = 0;
                viewLinks.classList.remove('view-hidden');
                viewLinks.classList.add('view-active');
            }, 400);
        }
    </script>
</body>
</html>
